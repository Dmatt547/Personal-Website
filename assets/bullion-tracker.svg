<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" width="760" height="760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- App background -->
  <rect width="760" height="760" fill="#f6f7f9"/>

  <!-- Header -->
  <g transform="translate(40,40)">
    <text x="0" y="26" font-size="30">🪙</text>
    <text x="44" y="28" font-size="26" font-weight="700" fill="#1a1d21">Bullion Tracker</text>
    <circle cx="540" cy="20" r="5" fill="#1a7f4b"/>
    <text x="552" y="25" font-size="13" fill="#6b7280">live</text>
    <rect x="600" y="6" width="80" height="28" rx="8" fill="#fff" stroke="#e7e9ee"/>
    <text x="640" y="25" font-size="12" font-weight="600" fill="#1a1d21" text-anchor="middle">Sign in</text>
  </g>
  <text x="40" y="98" font-size="13" fill="#6b7280">Gold &amp; silver holdings · all values in AUD</text>

  <!-- Summary cards -->
  <g transform="translate(40,120)">
    <!-- Total value -->
    <rect x="0" y="0" width="220" height="92" rx="12" fill="#fff" stroke="#e7e9ee"/>
    <text x="16" y="26" font-size="12" font-weight="600" fill="#6b7280">PORTFOLIO VALUE</text>
    <text x="16" y="58" font-size="26" font-weight="700" fill="#1a1d21">$31,723.08</text>
    <rect x="16" y="68" width="92" height="18" rx="9" fill="#e7f5ed"/>
    <text x="62" y="81" font-size="11" font-weight="700" fill="#1a7f4b" text-anchor="middle">+79.13%</text>

    <!-- Gold -->
    <rect x="230" y="0" width="220" height="92" rx="12" fill="#fbf6e7" stroke="#e7e9ee"/>
    <circle cx="248" cy="22" r="5" fill="#c9a227"/>
    <text x="262" y="27" font-size="12" font-weight="700" fill="#c9a227">GOLD · 5.00 oz</text>
    <text x="246" y="58" font-size="22" font-weight="700" fill="#1a1d21">$31,617.30</text>
    <text x="246" y="80" font-size="12" fill="#6b7280">$6,323.46 / oz</text>

    <!-- Silver -->
    <rect x="460" y="0" width="220" height="92" rx="12" fill="#f1f3f5" stroke="#e7e9ee"/>
    <circle cx="478" cy="22" r="5" fill="#8a9099"/>
    <text x="492" y="27" font-size="12" font-weight="700" fill="#8a9099">SILVER · 1.00 oz</text>
    <text x="476" y="58" font-size="22" font-weight="700" fill="#1a1d21">$105.78</text>
    <text x="476" y="80" font-size="12" fill="#6b7280">$105.78 / oz</text>
  </g>

  <!-- Spot row -->
  <g transform="translate(40,232)">
    <rect x="0" y="0" width="680" height="48" rx="12" fill="#fff" stroke="#e7e9ee"/>
    <text x="16" y="22" font-size="11" fill="#6b7280">Gold spot (AUD/oz)</text>
    <rect x="16" y="26" width="120" height="14" rx="4" fill="#f6f7f9"/>
    <text x="22" y="37" font-size="11" fill="#1a1d21">6323.46</text>
    <text x="200" y="22" font-size="11" fill="#6b7280">Silver spot (AUD/oz)</text>
    <rect x="200" y="26" width="120" height="14" rx="4" fill="#f6f7f9"/>
    <text x="206" y="37" font-size="11" fill="#1a1d21">105.78</text>
    <text x="664" y="29" font-size="11" fill="#6b7280" text-anchor="end">live · just now</text>
  </g>

  <!-- Charts row -->
  <g transform="translate(40,300)">
    <!-- Allocation donut -->
    <rect x="0" y="0" width="330" height="190" rx="12" fill="#fff" stroke="#e7e9ee"/>
    <text x="16" y="26" font-size="13" font-weight="700" fill="#1a1d21">Allocation by metal</text>
    <g transform="translate(110,112)">
      <!-- Gold ~99.7%, silver tiny: draw mostly gold ring with thin silver tick -->
      <circle r="46" fill="none" stroke="#c9a227" stroke-width="22"/>
      <path d="M 0 -46 A 46 46 0 0 1 2 -45.9" fill="none" stroke="#8a9099" stroke-width="22"/>
      <circle r="30" fill="#fff"/>
    </g>
    <g transform="translate(200,80)">
      <rect x="0" y="0" width="11" height="11" rx="2" fill="#c9a227"/>
      <text x="18" y="10" font-size="12" fill="#1a1d21">Gold 99.7%</text>
      <rect x="0" y="24" width="11" height="11" rx="2" fill="#8a9099"/>
      <text x="18" y="34" font-size="12" fill="#1a1d21">Silver 0.3%</text>
    </g>

    <!-- Value over time line -->
    <rect x="350" y="0" width="330" height="190" rx="12" fill="#fff" stroke="#e7e9ee"/>
    <text x="366" y="26" font-size="13" font-weight="700" fill="#1a1d21">Portfolio value over time</text>
    <polyline points="370,150 410,146 450,138 490,142 530,120 570,112 610,96 650,70"
              fill="none" stroke="#2b6cb0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="370,150 410,146 450,138 490,142 530,120 570,112 610,96 650,70 650,168 370,168"
             fill="#2b6cb0" opacity="0.08"/>
    <line x1="366" y1="168" x2="664" y2="168" stroke="#e7e9ee"/>
  </g>

  <!-- Holdings table -->
  <g transform="translate(40,510)">
    <rect x="0" y="0" width="680" height="210" rx="12" fill="#fff" stroke="#e7e9ee"/>
    <text x="16" y="28" font-size="13" font-weight="700" fill="#1a1d21">Holdings</text>
    <!-- header -->
    <text x="16" y="54" font-size="11" font-weight="700" fill="#6b7280">ITEM</text>
    <text x="330" y="54" font-size="11" font-weight="700" fill="#6b7280">OZ</text>
    <text x="430" y="54" font-size="11" font-weight="700" fill="#6b7280">COST</text>
    <text x="560" y="54" font-size="11" font-weight="700" fill="#6b7280">VALUE</text>
    <line x1="16" y1="62" x2="664" y2="62" stroke="#e7e9ee"/>
    <!-- rows -->
    <g font-size="12" fill="#1a1d21">
      <circle cx="22" cy="80" r="4" fill="#c9a227"/>
      <text x="34" y="84">Royal Canadian Mint 1oz ×2</text>
      <text x="330" y="84">2.00</text><text x="430" y="84">$4,655</text><text x="560" y="84">$12,646.92</text>

      <circle cx="22" cy="106" r="4" fill="#c9a227"/>
      <text x="34" y="110">Royal Canadian Mint 1oz</text>
      <text x="330" y="110">1.00</text><text x="430" y="110">$3,655</text><text x="560" y="110">$6,323.46</text>

      <circle cx="22" cy="132" r="4" fill="#c9a227"/>
      <text x="34" y="136">Royal Canadian Mint 1oz ×2</text>
      <text x="330" y="136">2.00</text><text x="430" y="136">$9,310</text><text x="560" y="136">$12,646.92</text>

      <circle cx="22" cy="158" r="4" fill="#8a9099"/>
      <text x="34" y="162">Silver round</text>
      <text x="330" y="162">1.00</text><text x="430" y="162">$90</text><text x="560" y="162">$105.78</text>
    </g>
    <line x1="16" y1="176" x2="664" y2="176" stroke="#e7e9ee" stroke-width="2"/>
    <text x="34" y="196" font-size="12" font-weight="700" fill="#1a1d21">Total</text>
    <text x="330" y="196" font-size="12" font-weight="700" fill="#1a1d21">6.00</text>
    <text x="430" y="196" font-size="12" font-weight="700" fill="#1a1d21">$17,710</text>
    <text x="560" y="196" font-size="12" font-weight="700" fill="#1a7f4b">$31,723.08</text>
  </g>
</svg>
